name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: ytui-dl
            asset_name: ytui-dl-x86_64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin_name: ytui-dl.exe
            asset_name: ytui-dl-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        # Windows CRT is linked statically via .cargo/config.toml
        # (target-feature=+crt-static) so the exe does not need VC++ Redistributable.
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          BIN_SRC="target/${{ matrix.target }}/release/${{ matrix.bin_name }}"
          ASSET="${{ matrix.asset_name }}"
          cp "$BIN_SRC" "$ASSET"
          chmod +x "$ASSET"
          strip "$ASSET" || true
          sha256sum "$ASSET" | tee "${ASSET}.sha256"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.bin_name }}"
          $asset = "${{ matrix.asset_name }}"
          Copy-Item $bin $asset
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "${asset}.sha256"
          Get-Content "${asset}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
