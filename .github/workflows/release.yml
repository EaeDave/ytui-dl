name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          # aarch64 via cross (optional; enable when needed)
          # - target: aarch64-unknown-linux-gnu
          #   use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          set -euo pipefail
          BIN_SRC="target/${{ matrix.target }}/release/ytui-dl"
          ASSET="ytui-dl-${{ matrix.target }}"
          cp "$BIN_SRC" "$ASSET"
          chmod +x "$ASSET"
          strip "$ASSET" || true
          sha256sum "$ASSET" | tee "${ASSET}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytui-dl-${{ matrix.target }}
          path: |
            ytui-dl-${{ matrix.target }}
            ytui-dl-${{ matrix.target }}.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
